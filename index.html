<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Danh sách ceci muốn mua</title>

<style>
body{
font-family: Arial;
background:#f4f6fb;
max-width:500px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

input{
padding:10px;
width:70%;
}

button{
padding:10px;
}

li{
margin:10px 0;
}

.done{
text-decoration: line-through;
color: gray;
}
</style>

</head>

<body>

<h1>🛒 ceci muốn mua gì?</h1>

<input id="item">
<button onclick="addItem()">Thêm</button>

<ul id="list"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtFALlVc-PVVL1O5Yt0vtcekOBtwM",
  authDomain: "shopping-list-ceci.firebaseapp.com",
  projectId: "shopping-list-ceci",
  storageBucket: "shopping-list-ceci.firebasestorage.app",
  messagingSenderId: "873728604373",
  appId: "1:873728604373:web:81c7d87a0bdc0e90a70a5c",
  measurementId: "G-XLG9NE7ZXK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list")

window.addItem = async function(){

const input = document.getElementById("item")

if(input.value.trim()=="") return

await addDoc(collection(db,"items"),{
text:input.value
})

input.value=""

}

onSnapshot(collection(db,"items"),(snapshot)=>{

list.innerHTML=""

snapshot.forEach(doc=>{

let li=document.createElement("li")

li.innerText=doc.data().text

list.appendChild(li)

})

})

</script>

</body>
</html>
