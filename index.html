<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ceci Shopping List</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:20px;
width:380px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#667eea;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#5565d9;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
background:#f7f7fb;
padding:12px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.done{
text-decoration:line-through;
color:gray;
}

</style>
</head>

<body>

<div class="container">

  <h1>🛒 Ceci's Shopping List</h1>

  <div class="input-group">
    <input id="itemInput" placeholder="Thêm món..." />
    <button onclick="addItem()">+</button>
  </div>

  <ul id="list"></ul>

</div>

<ul id="list"></ul>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDtFALlVc-PVVL1O5Yt0vtcekOBtwM",
authDomain: "shopping-list-ceci.firebaseapp.com",
projectId: "shopping-list-ceci",
storageBucket: "shopping-list-ceci.firebasestorage.app",
messagingSenderId: "873728604373",
appId: "1:873728604373:web:81c7d87a0bdc0e90a70a5c",
measurementId: "G-XLG9NE7ZXK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

window.addItem = async function(){

const input = document.getElementById("item");

if(input.value.trim()=="") return;

await addDoc(collection(db,"items"),{
text:input.value
});

input.value="";
}

onSnapshot(collection(db,"items"),(snapshot)=>{

list.innerHTML="";

snapshot.forEach(d=>{

let li=document.createElement("li");

let text=document.createElement("span");
text.innerText=d.data().text;

let edit=document.createElement("button");
edit.innerText="✏";

let del=document.createElement("button");
del.innerText="❌";

edit.onclick=async ()=>{
let newText=prompt("Sửa món:",d.data().text);
if(newText){
await updateDoc(doc(db,"items",d.id),{text:newText});
}
}

del.onclick=async ()=>{
await deleteDoc(doc(db,"items",d.id));
}

li.appendChild(text);
li.appendChild(edit);
li.appendChild(del);

list.appendChild(li);

});

let li=document.createElement("li");

li.innerText=doc.data().text;

li.onclick=function(){
li.classList.toggle("done");
}

list.appendChild(li);

});

</script>

</body>
</html>
