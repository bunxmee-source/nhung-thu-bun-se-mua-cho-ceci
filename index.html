<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Danh sách ceci muốn mua</title>

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
background: linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:20px;
width:380px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#667eea;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#5565d9;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
background:#f7f7fb;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

</style>
h1{
text-align:center;
}

input{
padding:10px;
width:70%;
}

button{
padding:10px;
}

li{
margin:10px 0;
}

.done{
text-decoration: line-through;
color: gray;
}
</style>

</head>

<body>

<div class="container">

<h1>🛒 Ceci's Shopping List</h1>

<div class="input-area">
<input id="item" placeholder="Thêm món...">
<button onclick="addItem()">+</button>
</div>

<ul id="list"></ul>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtFALlVc-PVVL1O5Yt0vtcekOBtwM",
  authDomain: "shopping-list-ceci.firebaseapp.com",
  projectId: "shopping-list-ceci",
  storageBucket: "shopping-list-ceci.firebasestorage.app",
  messagingSenderId: "873728604373",
  appId: "1:873728604373:web:81c7d87a0bdc0e90a70a5c",
  measurementId: "G-XLG9NE7ZXK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list")

window.addItem = async function(){

const input = document.getElementById("item")

if(input.value.trim()=="") return

await addDoc(collection(db,"items"),{
text:input.value
})

input.value=""

}

onSnapshot(collection(db,"items"),(snapshot)=>{

list.innerHTML=""

snapshot.forEach(doc=>{

let li=document.createElement("li")

li.innerText=doc.data().text

list.appendChild(li)

})

})

</script>

</html>
