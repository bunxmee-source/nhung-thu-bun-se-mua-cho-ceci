<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ceci muốn mua gì?</title>

<style>

body{
font-family:Arial;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:340px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

.row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
cursor:pointer;
}

ul{
margin-top:20px;
padding:0;
}

li{
list-style:none;
background:#f3f3f3;
padding:10px;
border-radius:8px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
}

.delete{
background:#ff4d4d;
}

</style>
</head>

<body>

<div class="box">

<h2>Ceci muốn mua gì?</h2>

<div class="row">
<input id="input" placeholder="Nhập món...">
<button id="addBtn">+</button>
</div>

<ul id="list"></ul>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getDatabase,
ref,
push,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyDtFA__TlqIvC-PvYL105Yt0vteckOBtwM",
  authDomain: "shopping-list-ceci.firebaseapp.com",
  databaseURL: "https://shopping-list-ceci-default-rtdb.firebaseio.com",
  projectId: "shopping-list-ceci",
  storageBucket: "shopping-list-ceci.firebasestorage.app",
  messagingSenderId: "873728604373",
  appId: "1:873728604373:web:81c7d87a0bdc0e90a70a5c"
};


const app = initializeApp(firebaseConfig);
const database = getDatabase(app);


const input = document.getElementById("input");
const addBtn = document.getElementById("addBtn");
const list = document.getElementById("list");


const itemsRef = ref(database, "items");


addBtn.onclick = () => {

const text = input.value.trim();

if(text === "") return;

push(itemsRef,{
name:text
});

input.value="";

};


onValue(itemsRef,(snapshot)=>{

list.innerHTML="";

if(!snapshot.exists()) return;

const data = snapshot.val();

Object.entries(data).forEach(([id,item])=>{

const li = document.createElement("li");

li.innerHTML = `
${item.name}
<button class="delete">x</button>
`;

li.querySelector("button").onclick = ()=>{
remove(ref(database,"items/"+id));
};

list.appendChild(li);

});

});

</script>

</body>
</html>
