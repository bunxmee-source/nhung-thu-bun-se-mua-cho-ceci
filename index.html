<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ceci muốn mua gì?</title>

<style>

body{
font-family:Arial;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:340px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

.row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
cursor:pointer;
}

ul{
margin-top:20px;
padding:0;
}

li{
list-style:none;
background:#f3f3f3;
padding:10px;
border-radius:8px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
}

.delete{
background:#ff4d4d;
}

</style>
</head>

<body>

<div class="box">

<h2>Ceci muốn mua gì?</h2>

<div class="row">
<input id="input" placeholder="Nhập món...">
<button id="addBtn">+</button>
</div>

<ul id="list"></ul>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "API_KEY",
authDomain: "PROJECT_ID.firebaseapp.com",
projectId: "PROJECT_ID",
storageBucket: "PROJECT_ID.appspot.com",
messagingSenderId: "ID",
appId: "APP_ID"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const input = document.getElementById("input");
const addBtn = document.getElementById("addBtn");
const list = document.getElementById("list");


addBtn.onclick = async () => {

const text = input.value.trim();

if(text==="") return;

await addDoc(collection(db,"items"),{
name:text
});

input.value="";

};


onSnapshot(collection(db,"items"), snapshot => {

list.innerHTML="";

snapshot.forEach(docSnap => {

const data = docSnap.data();

const li = document.createElement("li");

li.innerHTML = `
${data.name}
<button class="delete" onclick="deleteItem('${docSnap.id}')">x</button>
`;

list.appendChild(li);

});

});


window.deleteItem = async (id) => {

await deleteDoc(doc(db,"items",id));

};

</script>

</body>
</html>
